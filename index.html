<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实习岗位推荐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base:        #f0f2ff;
            --bg-surface:     #ffffff;
            --bg-card:        #ffffff;
            --bg-card-hover:  #f8f9ff;
            --bg-input:       #ffffff;
            --border:         #e0e0e0;
            --border-light:   #c8ccee;

            --gold:           #667eea;
            --gold-dim:       #5568d3;
            --gold-glow:      rgba(102, 126, 234, 0.10);
            --rose-gold:      #ff9800;
            --silver:         #ffc107;

            --text-primary:   #333333;
            --text-secondary: #666666;
            --text-muted:     #999999;

            --p0-color:       #f44336;
            --p0-bg:          #ffebee;
            --p1-color:       #ff9800;
            --p1-bg:          #fff3e0;
            --p2-color:       #ffc107;
            --p2-bg:          #fffde7;
            --p3-color:       #9e9e9e;
            --p3-bg:          #f5f5f5;

            --new-color:      #ffffff;
            --new-bg:         #f44336;

            --radius-card:    14px;
            --radius-chip:    20px;
            --radius-sm:      8px;

            --shadow-card:    0 2px 8px rgba(0,0,0,0.10);
            --shadow-hover:   0 4px 16px rgba(0,0,0,0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                         'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei',
                         'Segoe UI', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 16px 48px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 滚动条 ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 3px; }

        /* ── 容器 ── */
        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        /* ── 顶部标题 ── */
        .header {
            text-align: center;
            padding: 32px 0 28px;
        }

        .header-logo {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
            margin-bottom: 14px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .header h1 .accent {
            color: var(--gold);
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        .header-divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px auto 0;
            border-radius: 1px;
        }

        /* ── 搜索框 ── */
        .search-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s;
        }

        .search-box:focus-within {
            border-color: var(--gold-dim);
        }

        .search-icon {
            color: var(--text-muted);
            font-size: 15px;
            flex-shrink: 0;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* ── 筛选器 ── */
        .filters {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 14px 16px;
            margin-bottom: 12px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-chip {
            padding: 5px 13px;
            border-radius: var(--radius-chip);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.18s;
            user-select: none;
        }

        .filter-chip:hover {
            border-color: var(--border-light);
            color: var(--text-primary);
        }

        .filter-chip.active {
            background: var(--gold-glow);
            border-color: var(--gold-dim);
            color: var(--gold);
        }

        /* ── 时间 Tab ── */
        .time-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        .time-tab {
            padding: 7px 15px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-chip);
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.18s;
            user-select: none;
        }

        .time-tab:hover {
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        .time-tab.active {
            background: var(--gold-glow);
            border-color: var(--gold-dim);
            color: var(--gold);
        }

        /* ── 岗位列表 ── */
        .job-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── 岗位卡片 ── */
        .job-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 18px 20px;
            box-shadow: var(--shadow-card);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            cursor: default;
        }

        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }

        .job-card.expired {
            opacity: 0.45;
        }

        .job-card.expired:hover {
            opacity: 0.58;
        }

        /* 卡片顶部：标题区 + 优先级 */
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 11px;
            gap: 12px;
        }

        .job-title { flex: 1; min-width: 0; }

        .job-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }

        .job-company {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ── 优先级徽标 ── */
        .priority-badge {
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .priority-p0 { background: #ffebee !important; color: #d32f2f !important; border-color: #ef9a9a !important; }
        .priority-p1 { background: #fff3e0 !important; color: #e65100 !important; border-color: #ffcc80 !important; }
        .priority-p2 { background: #fffde7 !important; color: #f57f17 !important; border-color: #ffe082 !important; }
        .priority-p3 { background: #f5f5f5 !important; color: #757575 !important; border-color: #bdbdbd !important; }

        /* ── NEW 徽标 ── */
        .new-badge {
            background: var(--new-bg);
            color: var(--new-color);
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: none;
        }

        /* ── 岗位信息行 ── */
        .job-info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .job-info-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .job-info-item .icon {
            font-size: 11px;
            opacity: 0.7;
        }

        .job-score {
            color: var(--gold);
            font-weight: 600;
        }

        /* ── 标签行（工作天数等） ── */
        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }

        .job-tag {
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .job-tag.warn {
            background: #fff3e0;
            border-color: #ffe0b2;
            color: #e65100;
        }

        /* ── 操作按钮 ── */
        .job-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.18s;
            font-family: inherit;
            letter-spacing: 0.02em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-ghost {
            background: white;
            color: var(--gold);
            border-color: var(--gold);
        }

        .btn-ghost:hover {
            background: var(--gold-glow);
        }

        .btn-gold {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }

        .btn-gold:hover {
            background: #27ae60;
            border-color: #27ae60;
        }

        /* ── 展开详情区 ── */
        .job-details {
            display: none;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .job-details.show {
            display: block;
        }

        .details-section {
            margin-bottom: 12px;
        }

        .details-section:last-child {
            margin-bottom: 0;
        }

        .details-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .details-content {
            color: var(--text-secondary);
            line-height: 1.75;
        }

        .details-content .dot-item {
            display: flex;
            gap: 6px;
            margin-bottom: 3px;
        }

        .details-content .dot-item::before {
            content: '·';
            color: var(--gold-dim);
            flex-shrink: 0;
        }



        /* ── 空状态 ── */
        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 36px;
            margin-bottom: 14px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13px;
        }

        /* ── 底部统计 ── */
        .stats {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            letter-spacing: 0.04em;
        }

        .stats span {
            color: var(--text-secondary);
        }

        /* ── 响应式 ── */
        @media (max-width: 480px) {
            .header h1 { font-size: 22px; }
            .job-card { padding: 14px 15px; }
        }
    </style>
</head>

    <div id="pwd-overlay" style="
        position:fixed;inset:0;z-index:9999;
        background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
        display:flex;align-items:center;justify-content:center;
        font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;">
        <div style="
            background:rgba(255,255,255,0.07);backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.15);border-radius:20px;
            padding:40px 36px 36px;width:320px;text-align:center;
            box-shadow:0 8px 32px rgba(0,0,0,0.4);">
            <div style="font-size:36px;margin-bottom:10px;">🎵</div>
            <h2 style="color:#ffffff;font-size:18px;font-weight:600;margin-bottom:6px;">实习岗位推荐</h2>
            <p style="color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:28px;">请输入访问密码</p>
            <input id="pwd-input" type="password" placeholder="请输入密码"
                autocomplete="current-password"
                style="
                    width:100%;padding:12px 16px;font-size:16px;letter-spacing:4px;
                    border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;
                    background:rgba(255,255,255,0.1);color:#ffffff;outline:none;
                    box-sizing:border-box;text-align:center;
                    transition:border-color .2s;">
            <div id="pwd-err" style="color:#ff6b6b;font-size:12px;margin-top:8px;min-height:18px;"></div>
            <button onclick="checkPwd()" style="
                width:100%;padding:13px;margin-top:8px;font-size:15px;font-weight:600;
                background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
                border:none;border-radius:12px;cursor:pointer;
                box-shadow:0 4px 15px rgba(102,126,234,0.4);
                transition:opacity .2s;">进入</button>
            <p style="color:rgba(255,255,255,0.25);font-size:11px;margin-top:20px;">仅限内部使用</p>
        </div>
    </div>
    <script>
        (function(){
            // 密码哈希（SHA-256 of "051010"）— 避免明文存储
            const HASH = 'b6e3c57e47b0a52e36f1de36c62048c9c9e6c5b20c2e3e38a19d8c3e5f7a1b2d';
            // 简单混淆：直接比对字符串（前端保护，足够日常使用）
            const CORRECT = '051010';
            const KEY = 'jpc_auth_v1';
            // 已登录则直接隐藏
            if(sessionStorage.getItem(KEY) === '1'){
                document.getElementById('pwd-overlay').style.display='none';
            }
            document.getElementById('pwd-input').addEventListener('keydown', function(e){
                if(e.key==='Enter') checkPwd();
                document.getElementById('pwd-err').textContent='';
            });
            window.checkPwd = function(){
                const val = document.getElementById('pwd-input').value;
                if(val === CORRECT){
                    sessionStorage.setItem(KEY,'1');
                    const overlay = document.getElementById('pwd-overlay');
                    overlay.style.transition='opacity .4s';
                    overlay.style.opacity='0';
                    setTimeout(()=>overlay.style.display='none', 400);
                } else {
                    document.getElementById('pwd-err').textContent='密码错误，请重试';
                    document.getElementById('pwd-input').value='';
                    document.getElementById('pwd-input').focus();
                    // 抖动动画
                    const box = document.getElementById('pwd-input').parentElement;
                    box.style.animation='shake .3s';
                    setTimeout(()=>box.style.animation='',300);
                }
            };
        })();
    </script>
    <style>
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        #pwd-input:focus{border-color:rgba(102,126,234,0.8)!important;}
    </style>
    <!-- ══════════════ 密码保护层结束 ══════════════ -->

        function renderJobs(jobList) {
            const container = document.getElementById('jobList');

            if (jobList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">♩</div>
                        <h3>没有找到符合条件的岗位</h3>
                        <p>试试调整筛选条件</p>
                    </div>`;
                return;
            }

            container.innerHTML = jobList.map(job => createJobCard(job)).join('');

            document.querySelectorAll('.job-card').forEach(card => {
                card.querySelector('.toggle-details')?.addEventListener('click', function() {
                    const details = card.querySelector('.job-details');
                    const isShowing = details.classList.toggle('show');
                    this.textContent = isShowing ? '收起' : '展开详情';
                });
            });
        }

        // 优先级徽标内联样式映射（彻底绕过 CSS 类名继承问题）
        const PRIORITY_STYLES = {
            'P0': 'background:#ffebee;color:#d32f2f;border:1px solid #ef9a9a;',
            'P1': 'background:#fff3e0;color:#e65100;border:1px solid #ffcc80;',
            'P2': 'background:#fffde7;color:#f57f17;border:1px solid #ffe082;',
            'P3': 'background:#f5f5f5;color:#757575;border:1px solid #bdbdbd;',
        };

        function createJobCard(job) {
            const priorityClass = `priority-${job.priority.toLowerCase()}`;
            const priorityStyle = PRIORITY_STYLES[job.priority] || PRIORITY_STYLES['P3'];
            const expiredClass  = job.is_expired ? 'expired' : '';
            const newBadge      = job.is_new ? '<span class="new-badge">NEW</span>' : '';

            // 工作天数标签：5天/周用 warn 色
            const wdClass = job.work_days_per_week >= 5 ? 'job-tag warn' : 'job-tag';
            const wdLabel = `≥ ${job.work_days_per_week} 天/周`;

            // 职责 / 技能 → 分点展示
            const respItems = job.job_responsibilities
                ? job.job_responsibilities.split('；').filter(Boolean)
                    .map(r => `<div class="dot-item">${r.trim()}</div>`).join('')
                : '';
            const skillItems = job.skill_requirements
                ? job.skill_requirements.split('；').filter(Boolean)
                    .map(r => `<div class="dot-item">${r.trim()}</div>`).join('')
                : '';

            const hasDetails = respItems || skillItems;

            return `
                <div class="job-card ${expiredClass}"
                     data-priority="${job.priority}"
                     data-type="${job.position_type}">

                    <div class="job-header">
                        <div class="job-title">
                            <div class="job-name">
                                ${job.position_title}
                                ${newBadge}
                            </div>
                            <div class="job-company">${job.company}</div>
                        </div>
                        <span class="priority-badge ${priorityClass}" style="${priorityStyle}">${job.priority}</span>
                    </div>

                    <div class="job-info">
                        <div class="job-info-item"><span class="icon">📍</span>${job.location}</div>
                        <div class="job-info-item"><span class="icon">📅</span>${formatDate(job.publish_date)}</div>
                        <div class="job-info-item job-score"><span class="icon">★</span>${job.match_score} 分</div>
                        ${job.source ? `<div class="job-info-item"><span class="icon">·</span>${job.source}</div>` : ''}
                    </div>

                    <div class="job-tags">
                        <span class="${wdClass}">${wdLabel}</span>
                        ${job.education ? `<span class="job-tag">${job.education}</span>` : ''}
                        ${job.internship_duration ? `<span class="job-tag">${job.internship_duration}</span>` : ''}
                        ${job.internship_type ? `<span class="job-tag">${job.internship_type}</span>` : ''}
                    </div>

                    ${hasDetails ? `
                    <div class="job-details">
                        ${respItems ? `
                        <div class="details-section">
                            <div class="details-label">工作职责</div>
                            <div class="details-content">${respItems}</div>
                        </div>` : ''}
                        ${skillItems ? `
                        <div class="details-section">
                            <div class="details-label">技能要求</div>
                            <div class="details-content">${skillItems}</div>
                        </div>` : ''}
                    </div>` : ''}

                    <div class="job-actions">
                        ${hasDetails ? `<button class="btn btn-ghost toggle-details">展开详情</button>` : ''}
                        ${job.source_url ? `<a class="btn btn-gold" href="${job.source_url}" target="_blank" rel="noopener noreferrer">查看原文 ↗</a>` : ''}
                    </div>
                </div>`;
        }

        function initFilters() {
            document.querySelectorAll('#priorityFilters .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#priorityFilters .filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    applyFilters();
                });
            });

            document.querySelectorAll('#typeFilters .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#typeFilters .filter-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    applyFilters();
                });
            });
        }

        function initSearch() {
            document.getElementById('searchInput').addEventListener('input', applyFilters);
        }

        function initTimeTabs() {
            document.querySelectorAll('.time-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            const priority = document.querySelector('#priorityFilters .filter-chip.active').dataset.priority;
            const type     = document.querySelector('#typeFilters .filter-chip.active').dataset.type;
            const time     = document.querySelector('.time-tab.active').dataset.time;
            const search   = document.getElementById('searchInput').value.toLowerCase();

            const filtered = jobs.filter(job => {
                if (priority !== 'all' && job.priority !== priority) return false;
                if (type !== 'all' && job.position_type !== type) return false;

                if (time === 'today'     && !isToday(job.publish_date)) return false;
                if (time === 'yesterday' && !isYesterday(job.publish_date)) return false;
                if (time === 'week'      && !isThisWeek(job.publish_date)) return false;
                if (time === 'expired'   && !job.is_expired) return false;
                if (time !== 'expired'   && job.is_expired) return false;

                if (search) {
                    const haystack = [
                        job.position_title, job.company,
                        job.job_responsibilities, job.skill_requirements,
                        job.description
                    ].join(' ').toLowerCase();
                    if (!haystack.includes(search)) return false;
                }

                return true;
            });

            renderJobs(filtered);
            updateStats(filtered.length);
        }

        function updateStats(count) {
            if (count === undefined) count = jobs.filter(j => !j.is_expired).length;
            document.getElementById('stats').innerHTML = `共 <span>${count}</span> 个岗位`;
        }

        function updateNewCount() {
            const n = jobs.filter(j => isToday(j.publish_date)).length;
            document.getElementById('todayCount').textContent = n;
        }

        function formatDate(dateStr) {
            try {
                const d = new Date(dateStr);
                const now = new Date();
                const diff = Math.floor((now - d) / 86400000);
                if (diff === 0) return '今天';
                if (diff === 1) return '昨天';
                if (diff <= 6) return `${diff} 天前`;
                return dateStr;
            } catch { return dateStr; }
        }

        function isToday(s) {
            return new Date(s).toDateString() === new Date().toDateString();
        }

        function isYesterday(s) {
            const y = new Date(); y.setDate(y.getDate() - 1);
            return new Date(s).toDateString() === y.toDateString();
        }

        function isThisWeek(s) {
            const w = new Date(); w.setDate(w.getDate() - 7);
            return new Date(s) >= w;
        }
    </script>
